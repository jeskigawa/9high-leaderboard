    // ==================== DATA IMPORT TAB ====================
    function DataImportTab({ players, showToast }) {
      const [email, setEmail] = React.useState('');
      const [password, setPassword] = React.useState('');
      const [hasPassword, setHasPassword] = React.useState(false);
      const [showCredPopup, setShowCredPopup] = React.useState(false);
      const [credEmail, setCredEmail] = React.useState('');
      const [credPassword, setCredPassword] = React.useState('');
      const [credSaving, setCredSaving] = React.useState(false);
      const [importMode, setImportMode] = React.useState('single');
      const [singleDate, setSingleDate] = React.useState(
        () => new Date().toISOString().split('T')[0]
      );
      const [rangeStart, setRangeStart] = React.useState('');
      const [rangeEnd, setRangeEnd] = React.useState('');
      const [busy, setBusy] = React.useState(false);
      const [statusMsgs, setStatusMsgs] = React.useState([]);
      const [importedEvents, setImportedEvents] = React.useState([]);
      const [expandedEvents, setExpandedEvents] = React.useState({});
      const [localEdits, setLocalEdits] = React.useState({}); // {importId: {ranking: {rank, points, netChips}}}
      const [showCategoryPopup, setShowCategoryPopup] = React.useState(false);
      const [pendingCategories, setPendingCategories] = React.useState({});
      const [pendingEvents, setPendingEvents] = React.useState([]);
      const [directUrl, setDirectUrl] = React.useState('');
      const [directBusy, setDirectBusy] = React.useState(false);
      const [importPage, setImportPage] = React.useState(0);
      const IMPORT_PER_PAGE = 20;
      const [filterHasPlayers, setFilterHasPlayers] = React.useState(false);
      const [filterHideAdded, setFilterHideAdded] = React.useState(false);
      const [backfillBusy, setBackfillBusy] = React.useState(false);
      const [bgImportRunning, setBgImportRunning] = React.useState(false);
      const [bgImportLog, setBgImportLog] = React.useState([]);
      const [cancellingLock, setCancellingLock] = React.useState(false);
      const logEndRef = React.useRef(null);
      const bgPollRef = React.useRef(null);

      // Poll import status when not actively importing (catch background runs)
      React.useEffect(() => {
        const poll = async () => {
          try {
            const data = await api('/api/sunvy/import-status');
            if (data) {
              setBgImportRunning(data.running);
              if (data.running || (data.recentLog && data.recentLog.length > 0)) {
                setBgImportLog(data.recentLog || []);
              }
            }
          } catch(e) {}
        };
        poll();
        bgPollRef.current = setInterval(poll, 4000);
        return () => clearInterval(bgPollRef.current);
      }, []);

      const cancelImportLock = async () => {
        setCancellingLock(true);
        try {
          const data = await api('/api/sunvy/import-cancel', { method: 'POST' });
          if (data && data.success) {
            setBgImportRunning(false);
            showToast('ロックを解除しました');
          } else {
            showToast((data && data.error) || '解除できませんでした', 'error');
          }
        } catch(e) { showToast('エラー', 'error'); }
        setCancellingLock(false);
      };

      // Watch for background import finishing → reload events → popup uncategorized
      const prevBgRunning = React.useRef(false);
      React.useEffect(() => {
        if (prevBgRunning.current && !bgImportRunning) {
          // Import just finished while we were away — reload and check for uncategorized
          api('/api/sunvy/imported-events').then(data => {
            if (data && data.events) {
              const evs = data.events;
              setImportedEvents(evs);
              const uncategorized = evs.filter(ev => !ev.eventType);
              if (uncategorized.length > 0) openCategoryPopup(uncategorized);
            }
          }).catch(() => {});
        }
        prevBgRunning.current = bgImportRunning;
      }, [bgImportRunning]);

      React.useEffect(() => {
        api('/api/sunvy/imported-events').then(data => {
          if (data && data.events) setImportedEvents([...data.events].reverse());
        }).catch(() => {});
        api('/api/sunvy/credentials').then(data => {
          if (data) {
            setEmail(data.email || '');
            setCredEmail(data.email || '');
            setHasPassword(!!data.hasPassword);
          }
        }).catch(() => {});
      }, []);

      React.useEffect(() => {
        if (logEndRef.current) logEndRef.current.scrollIntoView({ behavior: 'smooth' });
      }, [statusMsgs]);

      const addLog = (type, msg) => {
        setStatusMsgs(prev => [...prev.slice(-29), { type, msg }]);
      };

      const saveCreds = async () => {
        setCredSaving(true);
        try {
          await api('/api/sunvy/credentials', { method: 'POST', body: JSON.stringify({ email: credEmail, password: credPassword }) });
          setEmail(credEmail);
          setHasPassword(!!credPassword);
          setCredPassword('');
          setShowCredPopup(false);
          showToast('認証情報を保存しました');
        } catch(e) { showToast('保存に失敗しました', 'error'); }
        setCredSaving(false);
      };

      const startImport = async () => {
        // credentials stored server-side
        if (importMode === 'range' && (!rangeStart || !rangeEnd)) { showToast('開始日と終了日を入力してください', 'error'); return; }
        setBusy(true);
        setStatusMsgs([]);
        const body = {
          email: email.trim(), password: password.trim(),
          mode: importMode,
          date: importMode === 'single' ? singleDate : undefined,
          startDate: importMode === 'range' ? rangeStart : undefined,
          endDate: importMode === 'range' ? rangeEnd : undefined,
        };
        try {
          const resp = await fetch('/api/sunvy/import-events', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
          });
          const ct = resp.headers.get('content-type') || '';
          if (resp.status >= 400 || ct.includes('application/json')) {
            const err = await resp.json().catch(() => ({}));
            showToast(err.error || 'エラーが発生しました', 'error');
            setBusy(false); return;
          }
          const reader = resp.body.getReader();
          const decoder = new TextDecoder();
          let buffer = '';
          const freshEvents = [];
          let receivedDoneEvent = false;
          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop();
            for (const line of lines) {
              if (!line.startsWith('data: ')) continue;
              try {
                const evt = JSON.parse(line.slice(6));
                if (evt.type === 'status') addLog('status', evt.message);
                else if (evt.type === 'waiting') addLog('waiting', evt.message);
                else if (evt.type === 'warning') addLog('warning', '⚠️ ' + evt.message);
                else if (evt.type === 'progress') addLog('progress', evt.message);
                else if (evt.type === 'event') {
                  freshEvents.push(evt.event);
                  const tag = evt.action === '更新' ? '🔄' : '✅';
                  addLog('ok', tag + ' [' + (evt.action || '新規') + '] ' + (evt.event.pokerfansName || evt.event.pokerfansUrl) + ' (' + evt.matched + '/' + evt.total + '人マッチ)');
                } else if (evt.type === 'error') {
                  showToast(evt.message, 'error');
                  addLog('error', '❌ ' + evt.message);
                } else if (evt.type === 'done') {
                  receivedDoneEvent = true;
                  addLog('ok', evt.message || (evt.count + '件取込完了'));
                  showToast(evt.message || (evt.count + '件取込完了'));
                  const newOnly = freshEvents.filter(ev => !ev.updatedAt);
                  if (newOnly.length > 0) {
                    openCategoryPopup(newOnly);
                  }
                  setImportPage(0);
                }
              } catch(pe) {}
            }
          }
          if (freshEvents.length > 0) {
            setImportedEvents(prev => {
              const map = new Map(prev.map(e => [e.importId, e]));
              freshEvents.forEach(e => map.set(e.importId, e));
              return [...map.values()];
            });
          }
          // SSE接続が途中で切れた場合（サーバーは処理継続中）→ ポーリングで完了を待つ
          if (!receivedDoneEvent) {
            addLog('waiting', '⌛ 接続が切れました。サーバーでの処理を確認中...');
            for (let poll = 0; poll < 72; poll++) { // 最大6分待機
              await new Promise(r => setTimeout(r, 5000));
              try {
                const sr = await fetch('/api/sunvy/import-status');
                const sd = await sr.json();
                if (sd.recentLog && sd.recentLog.length > 0) {
                  const last = sd.recentLog[sd.recentLog.length - 1];
                  if (last.message) addLog('waiting', '📡 ' + last.message);
                }
                if (!sd.running) {
                  addLog('ok', '✅ サーバーでの取込が完了しました');
                  showToast('取込が完了しました');
                  // インポート済みリストを再取得
                  const evResp = await fetch('/api/sunvy/imported-events');
                  const evData = await evResp.json();
                  if (evData.events && evData.events.length > 0) {
                    setImportedEvents(evData.events);
                  }
                  setImportPage(0);
                  break;
                }
              } catch(pe) {}
            }
          }
        } catch(e) {
          // ネットワークエラーの場合もポーリングで完了確認
          addLog('waiting', '⌛ 接続エラー。サーバーでの処理を確認中...');
          for (let poll = 0; poll < 72; poll++) {
            await new Promise(r => setTimeout(r, 5000));
            try {
              const sr = await fetch('/api/sunvy/import-status');
              const sd = await sr.json();
              if (!sd.running) {
                addLog('ok', '✅ 取込完了（接続エラーからの復帰）');
                showToast('取込が完了しました');
                const evResp = await fetch('/api/sunvy/imported-events');
                const evData = await evResp.json();
                if (evData.events && evData.events.length > 0) setImportedEvents(evData.events);
                setImportPage(0);
                break;
              }
            } catch(pe2) {}
          }
        } finally {
          setBusy(false);
        }
      };

      const openCategoryPopup = (freshEvents) => {
        const defaults = {};
        freshEvents.forEach(ev => {
          const name = ev.pokerfansName || '';
          defaults[ev.importId] = /リングゲーム2-5-5|スペシャルリング/.test(name) ? 'ring' : 'tournament';
        });
        setPendingEvents(freshEvents);
        setPendingCategories(defaults);
        setShowCategoryPopup(true);
      };

      const importDirectUrl = async () => {
        if (!directUrl.trim()) { showToast('URLを入力してください', 'error'); return; }
        setDirectBusy(true);
        setStatusMsgs([]);
        try {
          const resp = await fetch('/api/sunvy/import-event-direct', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url: directUrl.trim() })
          });
          const ct = resp.headers.get('content-type') || '';
          if (resp.status >= 400 || ct.includes('application/json')) {
            const err = await resp.json().catch(() => ({}));
            showToast(err.error || 'エラーが発生しました', 'error');
            setDirectBusy(false); return;
          }
          const reader = resp.body.getReader();
          const decoder = new TextDecoder();
          let buffer = '';
          const freshEvents = [];
          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop();
            for (const line of lines) {
              if (!line.startsWith('data: ')) continue;
              try {
                const evt = JSON.parse(line.slice(6));
                if (evt.type === 'status') addLog('status', evt.message);
                else if (evt.type === 'warning') addLog('warning', '⚠️ ' + evt.message);
                else if (evt.type === 'progress') addLog('progress', evt.message);
                else if (evt.type === 'event') {
                  freshEvents.push(evt.event);
                  const tag = evt.action === '更新' ? '🔄' : '✅';
                  addLog('ok', tag + ' [' + (evt.action || '新規') + '] ' + (evt.event.pokerfansName || evt.event.pokerfansUrl) + ' (' + evt.matched + '/' + evt.total + '人マッチ)');
                } else if (evt.type === 'error') {
                  showToast(evt.message, 'error');
                  addLog('error', '❌ ' + evt.message);
                } else if (evt.type === 'done') {
                  addLog('ok', evt.message);
                  showToast(evt.message);
                  if (freshEvents.length > 0) {
                    // Update existing events in state (upsert by importId)
                    setImportedEvents(prev => {
                      const map = new Map(prev.map(e => [e.importId, e]));
                      freshEvents.forEach(e => map.set(e.importId, e));
                      return [...map.values()];
                    });
                    const newOnly = freshEvents.filter(ev => !ev.updatedAt);
                    if (newOnly.length > 0) openCategoryPopup(newOnly);
                    setImportPage(0);
                    setDirectUrl('');
                  }
                }
              } catch(pe) {}
            }
          }
        } catch(e) {
          showToast(e.message || '取込エラー', 'error');
          addLog('error', '❌ ' + (e.message || '取込エラー'));
        } finally {
          setDirectBusy(false);
        }
      };

      const toggleExpand = (id) => setExpandedEvents(prev => ({ ...prev, [id]: !prev[id] }));

      const backfillDates = async () => {
        setBackfillBusy(true);
        try {
          const resp = await fetch('/api/sunvy/imported-events/backfill-dates', { method: 'POST' });
          const data = await resp.json();
          if (data && data.fixed !== undefined) {
            showToast(`日付を補完しました（${data.fixed}件更新）`);
            // Reload imported events to reflect updated dates
            const evData = await api('/api/sunvy/imported-events');
            if (evData && evData.events) {
              setImportedEvents([...evData.events].reverse());
            }
          } else {
            showToast('バックフィル失敗: ' + (data.error || '不明なエラー'), 'error');
          }
        } catch(e) {
          showToast('バックフィルエラー: ' + e.message, 'error');
        } finally {
          setBackfillBusy(false);
        }
      };

      const updateMatch = async (importId, ranking, playerId) => {
        try {
          const resp = await fetch('/api/sunvy/imported-events/' + importId + '/match', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ranking, playerId: playerId || null })
          });
          const data = await resp.json();
          if (!resp.ok) throw new Error(data.error || '更新失敗');
          setImportedEvents(prev => prev.map(ev => {
            if (ev.importId !== importId) return ev;
            return { ...ev, results: ev.results.map(r => r.ranking === ranking ? data.result : r) };
          }));
        } catch(e) { showToast(e.message, 'error'); }
      };

      const deleteImportedEvent = async (importId, name) => {
        if (!confirm(`「${name}」を削除しますか？`)) return;
        try {
          await api(`/api/sunvy/imported-events/${importId}`, { method: 'DELETE' });
          setImportedEvents(prev => prev.filter(e => e.importId !== importId));
          showToast('削除しました');
        } catch(e) { showToast(e.message, 'error'); }
      };

      const addToLeaderboard = async (importId) => {
        const ev = importedEvents.find(e => e.importId === importId);
        const isRing = ev && ev.eventType === 'ring';
        const endpoint = isRing
          ? '/api/sunvy/imported-events/' + importId + '/add-to-ringgame'
          : '/api/sunvy/imported-events/' + importId + '/add-to-leaderboard';
        // Build playerOverrides from localEdits for this event
        const edits = localEdits[importId] || {};
        const playerOverrides = Object.entries(edits).map(([ranking, vals]) => ({
          ranking: Number(ranking), ...vals
        }));
        try {
          const resp = await fetch(endpoint, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ playerOverrides })
          });
          const data = await resp.json();
          if (!resp.ok) throw new Error(data.error || '追加失敗');
          const label = isRing ? 'リングゲームセッションに追加しました ✅' : 'トーナメント結果に追加しました ✅';
          showToast(label);
          setImportedEvents(prev => prev.map(e => e.importId === importId ? { ...e, addedToLeaderboard: true } : e));
        } catch(e) { showToast(e.message, 'error'); }
      };

      const logColor = { ok: 'var(--positive)', warning: '#f59e0b', error: 'var(--danger)',
        status: 'var(--text-secondary)', waiting: 'var(--text-muted)', progress: 'var(--info)' };

      const confirmCategories = async () => {
        const categories = pendingEvents.map(ev => ({
          importId: ev.importId,
          category: pendingCategories[ev.importId] || 'tournament'
        }));
        try {
          const resp = await fetch('/api/sunvy/imported-events/categorize', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ categories })
          });
          const data = await resp.json();
          if (!resp.ok) throw new Error(data.error || '分類保存失敗');
          const skipIds = new Set(categories.filter(c => c.category === 'skip').map(c => c.importId));
          setImportedEvents(prev => prev
            .filter(ev => !skipIds.has(ev.importId))
            .map(ev => {
              const cat = categories.find(c => c.importId === ev.importId);
              return cat ? { ...ev, eventType: cat.category } : ev;
            })
          );
          const skipCount = skipIds.size;
          const kept = categories.length - skipCount;
          showToast(`${kept}件を分類しました${skipCount > 0 ? `（${skipCount}件を非取込として削除）` : ''}`);
        } catch(e) { showToast(e.message, 'error'); }
        setShowCategoryPopup(false);
      };

      const catLabels = { ring: 'リングゲーム', tournament: 'トーナメント', skip: '非取込' };
      const catColors = { ring: '#0ea5e9', tournament: 'var(--accent)', skip: 'var(--danger)' };

      const CategoryPopup = showCategoryPopup ? (
        <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.65)', zIndex: 9999,
          display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 16 }}>
          <div style={{ background: 'var(--bg-secondary)', borderRadius: 12, padding: 24,
            width: '100%', maxWidth: 560, maxHeight: '80vh', display: 'flex', flexDirection: 'column',
            boxShadow: '0 20px 60px rgba(0,0,0,0.5)', border: '1px solid var(--border)' }}>
            <div style={{ fontWeight: 700, fontSize: 16, marginBottom: 4 }}>イベント分類</div>
            <div style={{ fontSize: 12, color: 'var(--text-muted)', marginBottom: 16 }}>
              取込んだイベントの種別を選択してください。「非取込」にしたイベントは削除されます。
            </div>
            <div style={{ overflowY: 'auto', flex: 1, marginBottom: 16 }}>
              {pendingEvents.map(ev => (
                <div key={ev.importId} style={{ borderBottom: '1px solid var(--border)',
                  paddingBottom: 12, marginBottom: 12 }}>
                  <div style={{ fontWeight: 600, fontSize: 13, marginBottom: 6 }}>
                    {(ev.pokerfansName || ev.pokerfansUrl || '').replace(/\s*\(Processed\)\s*/gi, '').trim() || ev.pokerfansUrl}
                    {ev.date && <span style={{ marginLeft: 8, fontWeight: 400, fontSize: 11,
                      color: 'var(--text-muted)' }}>{ev.date}</span>}
                  </div>
                  <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
                    {['ring', 'tournament', 'skip'].map(cat => {
                      const selected = pendingCategories[ev.importId] === cat;
                      return (
                        <label key={cat} style={{ display: 'flex', alignItems: 'center', gap: 5,
                          cursor: 'pointer', padding: '4px 12px', borderRadius: 6, fontSize: 12,
                          border: '1px solid ' + (selected ? catColors[cat] : 'var(--border)'),
                          background: selected ? catColors[cat] + '22' : 'transparent',
                          color: selected ? catColors[cat] : 'var(--text-secondary)',
                          fontWeight: selected ? 600 : 400, transition: 'all 0.15s' }}>
                          <input type="radio" name={ev.importId} value={cat}
                            checked={selected}
                            onChange={() => setPendingCategories(prev => ({ ...prev, [ev.importId]: cat }))}
                            style={{ display: 'none' }} />
                          {catLabels[cat]}
                        </label>
                      );
                    })}
                  </div>
                </div>
              ))}
            </div>
            <div style={{ display: 'flex', gap: 10, justifyContent: 'flex-end' }}>
              <button onClick={() => setShowCategoryPopup(false)}
                style={{ padding: '7px 18px', borderRadius: 7, border: '1px solid var(--border)',
                  background: 'transparent', color: 'var(--text-secondary)', cursor: 'pointer', fontSize: 13 }}>
                キャンセル
              </button>
              <button onClick={confirmCategories}
                style={{ padding: '7px 20px', borderRadius: 7, border: 'none',
                  background: 'var(--accent)', color: 'var(--bg-primary)', cursor: 'pointer',
                  fontSize: 13, fontWeight: 600 }}>
                確定
              </button>
            </div>
          </div>
        </div>
      ) : null;

      return (
        <div>
          {CategoryPopup}

          {/* Background import running banner */}
          {(bgImportRunning || (!busy && bgImportLog.length > 0)) && (
            <div style={{
              background: bgImportRunning ? 'rgba(245,158,11,0.1)' : 'rgba(100,116,139,0.08)',
              border: '1px solid ' + (bgImportRunning ? 'rgba(245,158,11,0.4)' : 'var(--border)'),
              borderRadius: 10, padding: '12px 16px', marginBottom: 16
            }}>
              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 8 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                  {bgImportRunning && (
                    <span style={{ display: 'inline-block', width: 8, height: 8, borderRadius: '50%',
                      background: 'var(--accent)', animation: 'pulse 1.2s ease-in-out infinite' }} />
                  )}
                  <span style={{ fontSize: 13, fontWeight: 600,
                    color: bgImportRunning ? 'var(--accent)' : 'var(--text-muted)' }}>
                    {bgImportRunning ? 'バックグラウンドで取込中...' : '直近の取込ログ'}
                  </span>
                </div>
                <div style={{ display: 'flex', gap: 6 }}>
                  {bgImportRunning && (
                    <button onClick={cancelImportLock} disabled={cancellingLock}
                      style={{ fontSize: 11, padding: '3px 10px', borderRadius: 6, cursor: 'pointer',
                        border: '1px solid var(--danger)', background: 'transparent',
                        color: 'var(--danger)' }}>
                      {cancellingLock ? '解除中...' : '強制停止'}
                    </button>
                  )}
                  <button onClick={() => setBgImportLog([])}
                    style={{ fontSize: 11, padding: '3px 8px', borderRadius: 6, cursor: 'pointer',
                      border: '1px solid var(--border)', background: 'transparent', color: 'var(--text-muted)' }}>
                    × 閉じる
                  </button>
                </div>
              </div>
              <div style={{ maxHeight: 160, overflowY: 'auto', fontSize: 11,
                fontFamily: 'monospace', lineHeight: 1.6 }}>
                {bgImportLog.slice(-30).map((m, i) => (
                  <div key={i} style={{
                    color: m.type === 'error' ? 'var(--danger)' : m.type === 'done' ? 'var(--positive)' : 'var(--text-secondary)'
                  }}>
                    {m.type === 'error' ? '✗ ' : m.type === 'done' ? '✓ ' : ''}{m.message}
                  </div>
                ))}
              </div>
            </div>
          )}

          <div className="card" style={{ marginBottom: 16 }}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
              <div className="card-title" style={{marginBottom:0}}>Sunvyイベント取込</div>
              <button onClick={() => { setCredEmail(email); setCredPassword(''); setShowCredPopup(true); }}
                title="認証情報を設定"
                style={{background:'none',border:'1px solid var(--border)',borderRadius:6,padding:'4px 8px',cursor:'pointer',fontSize:16,color:'var(--text-secondary)',display:'flex',alignItems:'center',gap:4}}>
                ⚙ <span style={{fontSize:11,color: email && hasPassword ? 'var(--positive)' : 'var(--warning, #f59e0b)'}}>
                  {email && hasPassword ? '設定済' : '未設定'}
                </span>
              </button>
            </div>

            {/* Credentials status + gear icon */}
            {showCredPopup && (
              <div style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,0.4)',zIndex:200,display:'flex',alignItems:'center',justifyContent:'center',padding:'5vh 16px'}} onClick={() => setShowCredPopup(false)}>
                <div style={{background:'var(--bg-card)',borderRadius:12,padding:24,width:'100%',maxWidth:400,boxShadow:'0 8px 32px rgba(0,0,0,0.25)'}} onClick={e => e.stopPropagation()}>
                  <div style={{fontWeight:700,fontSize:15,marginBottom:16}}>Sunvy 認証情報</div>
                  <div className="form-group">
                    <label className="form-label">メールアドレス</label>
                    <input className="form-input" type="email" placeholder="club.sunvy.jp のメール" value={credEmail} onChange={e => setCredEmail(e.target.value)} />
                  </div>
                  <div className="form-group">
                    <label className="form-label">パスワード</label>
                    <input className="form-input" type="password" placeholder="変更する場合のみ入力" value={credPassword} onChange={e => setCredPassword(e.target.value)} />
                  </div>
                  <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:8}}>
                    <button className="btn btn-secondary btn-sm" onClick={() => setShowCredPopup(false)}>キャンセル</button>
                    <button className="btn btn-primary btn-sm" onClick={saveCreds} disabled={credSaving || !credEmail}>{credSaving ? '保存中...' : '保存'}</button>
                  </div>
                </div>
              </div>
            )}

            {/* Mode toggle */}
            <div style={{ display: 'flex', gap: 8, marginBottom: 12 }}>
              {[['single','単日取込'],['range','期間指定']].map(([m, label]) => (
                <button key={m} onClick={() => setImportMode(m)}
                  style={{ padding: '5px 16px', borderRadius: 6, fontSize: 13, cursor: 'pointer', border: 'none',
                    background: importMode === m ? 'var(--accent)' : 'var(--bg-hover)',
                    color: importMode === m ? 'var(--bg-primary)' : 'var(--text-secondary)',
                    fontWeight: importMode === m ? 600 : 400 }}>
                  {label}
                </button>
              ))}
            </div>

            {/* Date inputs */}
            <div style={{ display: 'flex', gap: 12, flexWrap: 'wrap', marginBottom: 4 }}>
              {importMode === 'single' ? (
                <div className="form-group" style={{ flex: '1 1 160px' }}>
                  <label className="form-label">取込日</label>
                  <input className="form-input" type="date" value={singleDate}
                    onChange={e => setSingleDate(e.target.value)} />
                </div>
              ) : (
                <>
                  <div className="form-group" style={{ flex: '1 1 150px' }}>
                    <label className="form-label">開始日</label>
                    <input className="form-input" type="date" value={rangeStart}
                      onChange={e => setRangeStart(e.target.value)} />
                  </div>
                  <div className="form-group" style={{ flex: '1 1 150px' }}>
                    <label className="form-label">終了日</label>
                    <input className="form-input" type="date" value={rangeEnd}
                      onChange={e => setRangeEnd(e.target.value)} />
                  </div>
                </>
              )}
            </div>

            <button className="btn btn-primary" onClick={startImport} disabled={busy} style={{ marginTop: 4 }}>
              {busy ? '取込中...' : '▶ データ取込開始'}
            </button>
          </div>

          {/* Direct URL import */}
          <div className="card" style={{ marginBottom: 16 }}>
            <div className="card-title">イベント直接読込</div>
            <div style={{ display: 'flex', gap: 10, alignItems: 'flex-end', flexWrap: 'wrap' }}>
              <div className="form-group" style={{ flex: '1 1 280px', marginBottom: 0 }}>
                <label className="form-label">Sunvy イベントURL（applyers）</label>
                <input className="form-input" type="url"
                  placeholder="https://club.sunvy.jp/tours/events/.../applyers"
                  value={directUrl} onChange={e => setDirectUrl(e.target.value)}
                  onKeyDown={e => { if (e.key === 'Enter' && !busy && !directBusy) importDirectUrl(); }}
                  disabled={busy || directBusy} />
              </div>
              <button className="btn btn-primary" onClick={importDirectUrl}
                disabled={busy || directBusy || !directUrl.trim()}
                style={{ whiteSpace: 'nowrap', paddingLeft: 18, paddingRight: 18 }}>
                {directBusy ? '取込中...' : '▶ 直接読込'}
              </button>
            </div>
          </div>

          {statusMsgs.length > 0 && (
            <div className="card" style={{ marginBottom: 16 }}>
              <div className="card-title" style={{ marginBottom: 8 }}>取込ログ</div>
              <div style={{ maxHeight: 180, overflowY: 'auto', fontFamily: 'monospace', fontSize: 11,
                background: 'var(--bg-primary)', borderRadius: 6, padding: '8px 10px' }}>
                {statusMsgs.map((m, i) => (
                  <div key={i} style={{ color: logColor[m.type] || 'var(--text-secondary)', marginBottom: 2, lineHeight: 1.4 }}>
                    {m.msg}
                  </div>
                ))}
                <div ref={logEndRef} />
              </div>
            </div>
          )}

          {importedEvents.length > 0 && (() => {
            const sortedEvs = [...importedEvents].sort((a, b) => {
              const da = a.date || a.importedAt || '';
              const db = b.date || b.importedAt || '';
              return db.localeCompare(da);
            });

            // Apply filters
            const filteredEvs = sortedEvs.filter(ev => {
              if (filterHasPlayers && (ev.results || []).length === 0) return false;
              if (filterHideAdded && ev.addedToLeaderboard) return false;
              return true;
            });

            const totalPages = Math.ceil(filteredEvs.length / IMPORT_PER_PAGE);
            const safePage = Math.min(importPage, Math.max(0, totalPages - 1));
            const pagedEvs = filteredEvs.slice(safePage * IMPORT_PER_PAGE, (safePage + 1) * IMPORT_PER_PAGE);

            // Compact page numbers: always show first, last, current ±1, with ellipsis
            const pageNums = (() => {
              const nums = new Set([0, totalPages - 1, safePage, safePage - 1, safePage + 1].filter(n => n >= 0 && n < totalPages));
              return [...nums].sort((a, b) => a - b);
            })();

            const FilterBtn = ({ active, onClick, children }) => (
              <button onClick={onClick} style={{
                padding: '3px 10px', borderRadius: 12, fontSize: 11, cursor: 'pointer',
                border: '1px solid ' + (active ? 'var(--accent)' : 'var(--border)'),
                background: active ? 'rgba(245,158,11,0.15)' : 'transparent',
                color: active ? 'var(--accent)' : 'var(--text-muted)',
                fontWeight: active ? 600 : 400, whiteSpace: 'nowrap',
                transition: 'all 0.15s'
              }}>{children}</button>
            );

            return (
              <div className="card">
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 8 }}>
                  <div className="card-title" style={{ marginBottom: 0 }}>
                    取込済みイベント（{filteredEvs.length === importedEvents.length
                      ? `${importedEvents.length}件`
                      : `${filteredEvs.length}/${importedEvents.length}件`}）
                  </div>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                    {(() => {
                      const uncatCount = importedEvents.filter(e => !e.eventType).length;
                      return uncatCount > 0 ? (
                        <button className="btn btn-sm"
                          onClick={() => openCategoryPopup(importedEvents.filter(e => !e.eventType))}
                          style={{ fontSize: 11, padding: '4px 10px', borderRadius: 6,
                            background: 'rgba(245,158,11,0.15)', border: '1px solid rgba(245,158,11,0.5)',
                            color: 'var(--accent)', cursor: 'pointer', whiteSpace: 'nowrap' }}>
                          🏷 {uncatCount}件 未分類
                        </button>
                      ) : null;
                    })()}
                    {importedEvents.some(e => !e.date) && (
                      <button className="btn btn-secondary btn-sm" onClick={backfillDates} disabled={backfillBusy}>
                        {backfillBusy ? '補完中…' : '📅 日付を一括補完'}
                      </button>
                    )}
                    {totalPages > 1 && (
                      <div style={{ fontSize: 12, color: 'var(--text-muted)' }}>
                        {safePage + 1} / {totalPages} ページ
                      </div>
                    )}
                  </div>
                </div>

                {/* Filter chips */}
                <div style={{ display: 'flex', gap: 6, marginBottom: 12, flexWrap: 'wrap' }}>
                  <FilterBtn active={filterHasPlayers} onClick={() => { setFilterHasPlayers(v => !v); setImportPage(0); }}>
                    👥 参加者あり
                  </FilterBtn>
                  <FilterBtn active={filterHideAdded} onClick={() => { setFilterHideAdded(v => !v); setImportPage(0); }}>
                    ✓ 追加済みを非表示
                  </FilterBtn>
                  {(filterHasPlayers || filterHideAdded) && (
                    <button onClick={() => { setFilterHasPlayers(false); setFilterHideAdded(false); setImportPage(0); }}
                      style={{ padding: '3px 8px', borderRadius: 12, fontSize: 11, cursor: 'pointer',
                        border: '1px solid var(--border)', background: 'transparent',
                        color: 'var(--text-muted)' }}>
                      × クリア
                    </button>
                  )}
                </div>

                {pagedEvs.map(ev => {
                  const expanded = !!expandedEvents[ev.importId];
                  const matchedCount = (ev.results || []).filter(r => r.matchedPlayerId).length;
                  const totalCount = (ev.results || []).length;
                  const allMatched = matchedCount === totalCount;
                  return (
                    <div key={ev.importId} style={{ borderBottom: '1px solid var(--border)', paddingBottom: 12, marginBottom: 12 }}>
                      <div style={{ display: 'flex', alignItems: 'center', gap: 8, cursor: 'pointer', padding: '4px 0' }}
                        onClick={() => toggleExpand(ev.importId)}>
                        <span style={{ fontSize: 10, color: 'var(--text-muted)', width: 12 }}>{expanded ? '▼' : '▶'}</span>
                        <span style={{ flex: 1, fontWeight: 500, fontSize: 13 }}>{(ev.pokerfansName || ev.pokerfansUrl || '').replace(/\s*\(Processed\)\s*/gi, '').trim() || ev.pokerfansUrl}</span>
                        {ev.eventType && (
                          <span style={{ fontSize: 10, whiteSpace: 'nowrap', padding: '1px 7px', borderRadius: 10,
                            background: ev.eventType === 'ring' ? 'rgba(14,165,233,0.15)' : 'rgba(168,85,247,0.15)',
                            color: ev.eventType === 'ring' ? '#0ea5e9' : '#a855f7' }}>
                            {ev.eventType === 'ring' ? 'リングゲーム' : 'トーナメント'}
                          </span>
                        )}
                        <span style={{ fontSize: 11, color: 'var(--text-muted)', whiteSpace: 'nowrap' }}>{ev.date || '日付不明'}</span>
                        <span style={{ fontSize: 11, whiteSpace: 'nowrap', color: allMatched ? 'var(--positive)' : '#f59e0b' }}>
                          {matchedCount}/{totalCount}人
                        </span>
                        {ev.addedToLeaderboard && (
                          <span style={{ fontSize: 10, color: 'var(--positive)', background: 'rgba(34,197,94,0.12)',
                            padding: '1px 7px', borderRadius: 10, whiteSpace: 'nowrap' }}>追加済</span>
                        )}
                        <button
                          onClick={e => { e.stopPropagation(); deleteImportedEvent(ev.importId, (ev.pokerfansName || ev.pokerfansUrl || '').replace(/\s*\(Processed\)\s*/gi, '').trim() || ev.pokerfansUrl); }}
                          title="削除"
                          style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--text-muted)',
                            fontSize: 14, padding: '2px 4px', lineHeight: 1, flexShrink: 0 }}>
                          🗑
                        </button>
                      </div>
                      {expanded && (
                        <div style={{ marginTop: 10 }}>
                          {(() => {
                            const isRing = ev.eventType === 'ring';
                            const getEdit = (ranking, field, def) =>
                              localEdits[ev.importId]?.[ranking]?.[field] ?? def;
                            const setEdit = (ranking, field, value) =>
                              setLocalEdits(prev => ({
                                ...prev,
                                [ev.importId]: {
                                  ...(prev[ev.importId] || {}),
                                  [ranking]: { ...(prev[ev.importId]?.[ranking] || {}), [field]: value }
                                }
                              }));
                            const inputStyle = {
                              background: 'var(--bg-input)', color: 'var(--text-primary)',
                              border: '1px solid var(--border)', borderRadius: 4,
                              padding: '2px 6px', fontSize: 12, textAlign: 'right'
                            };
                            return (
                              <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 12, marginBottom: 10 }}>
                                <thead>
                                  <tr style={{ background: 'var(--bg-primary)' }}>
                                    <th style={{ padding: '4px 8px', textAlign: 'center', color: 'var(--text-secondary)', fontWeight: 500 }}>順位</th>
                                    <th style={{ padding: '4px 8px', textAlign: 'left', color: 'var(--text-secondary)', fontWeight: 500 }}>Nickname</th>
                                    {!isRing && <th style={{ padding: '4px 8px', textAlign: 'center', color: 'var(--accent)', fontWeight: 600 }}>Pts ✎</th>}
                                    {isRing  && <th style={{ padding: '4px 8px', textAlign: 'center', color: 'var(--accent)', fontWeight: 600 }}>純増チップ ✎</th>}
                                    <th style={{ padding: '4px 8px', textAlign: 'left', color: 'var(--text-secondary)', fontWeight: 500 }}>紐付けプレイヤー</th>
                                  </tr>
                                </thead>
                                <tbody>
                                  {(ev.results || []).map(r => (
                                    <tr key={r.ranking} style={{ borderBottom: '1px solid var(--border)' }}>
                                      <td style={{ padding: '3px 8px', textAlign: 'center' }}>
                                        {!isRing ? (() => {
                                          const isPart = getEdit(r.ranking, 'participation', false);
                                          return (
                                            <div style={{ display: 'flex', alignItems: 'center', gap: 3, justifyContent: 'center' }}>
                                              {!isPart && (
                                                <input type="number" value={getEdit(r.ranking, 'rank', r.ranking)}
                                                  onChange={e => setEdit(r.ranking, 'rank', Number(e.target.value))}
                                                  style={{ ...inputStyle, width: 46, textAlign: 'center' }} />
                                              )}
                                              <button
                                                onClick={() => setEdit(r.ranking, 'participation', !isPart)}
                                                title="参加（非入賞）に切り替え"
                                                style={{
                                                  fontSize: 9, padding: '2px 6px', borderRadius: 8, cursor: 'pointer',
                                                  border: '1px solid ' + (isPart ? 'var(--accent)' : 'var(--border)'),
                                                  background: isPart ? 'rgba(99,102,241,0.25)' : 'transparent',
                                                  color: isPart ? 'var(--accent)' : 'var(--text-muted)',
                                                  whiteSpace: 'nowrap', lineHeight: 1.4
                                                }}>参加</button>
                                            </div>
                                          );
                                        })() : r.ranking}
                                      </td>
                                      <td style={{ padding: '3px 8px' }}>{r.nickname}</td>
                                      {!isRing && (
                                        <td style={{ padding: '3px 8px', textAlign: 'center' }}>
                                          <input type="number" value={getEdit(r.ranking, 'points', 0)}
                                            onChange={e => setEdit(r.ranking, 'points', Number(e.target.value))}
                                            style={{ ...inputStyle, width: 72 }} />
                                        </td>
                                      )}
                                      {isRing && (
                                        <td style={{ padding: '3px 8px', textAlign: 'center' }}>
                                          <input type="number" value={getEdit(r.ranking, 'netChips', 0)}
                                            onChange={e => setEdit(r.ranking, 'netChips', Number(e.target.value))}
                                            style={{ ...inputStyle, width: 90 }} />
                                        </td>
                                      )}
                                      <td style={{ padding: '3px 8px' }}>
                                        <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
                                          <select value={r.matchedPlayerId || ''}
                                            onChange={e => updateMatch(ev.importId, r.ranking, e.target.value || null)}
                                            style={{ background: 'var(--bg-input)', color: 'var(--text-primary)',
                                              border: '1px solid var(--border)', borderRadius: 4,
                                              padding: '2px 4px', fontSize: 11, maxWidth: 160,
                                              borderLeft: '3px solid ' + (r.matchStatus === 'auto' ? 'var(--positive)' : r.matchStatus === 'manual' ? 'var(--info)' : 'var(--danger)') }}>
                                            <option value="">── 未設定 ──</option>
                                            {players.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
                                          </select>
                                          {r.matchStatus === 'auto' && (
                                            <span style={{ fontSize: 9, color: 'var(--positive)', background: 'rgba(34,197,94,0.12)',
                                              padding: '1px 5px', borderRadius: 8, whiteSpace: 'nowrap' }}>自動</span>
                                          )}
                                          {r.matchStatus === 'manual' && (
                                            <span style={{ fontSize: 9, color: 'var(--info)', background: 'rgba(59,130,246,0.12)',
                                              padding: '1px 5px', borderRadius: 8, whiteSpace: 'nowrap' }}>手動</span>
                                          )}
                                        </div>
                                      </td>
                                    </tr>
                                  ))}
                                </tbody>
                              </table>
                            );
                          })()}
                          {ev.eventType !== 'skip' && (
                            <div style={{ display: 'flex', gap: 8, alignItems: 'center', justifyContent: 'flex-end' }}>
                              <button className="btn btn-primary"
                                style={{ fontSize: 12, padding: '5px 14px', whiteSpace: 'nowrap' }}
                                onClick={() => addToLeaderboard(ev.importId)}>
                                {ev.addedToLeaderboard ? '🔄 再追加' : 'リーダーボードに追加'}
                              </button>
                            </div>
                          )}
                        </div>
                      )}
                    </div>
                  );
                })}

                {totalPages > 1 && (
                  <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 4, paddingTop: 8 }}>
                    <button onClick={() => setImportPage(p => Math.max(0, p - 1))}
                      disabled={safePage === 0}
                      style={{ padding: '4px 10px', borderRadius: 6, border: '1px solid var(--border)', fontSize: 13,
                        background: safePage === 0 ? 'transparent' : 'var(--bg-hover)',
                        color: safePage === 0 ? 'var(--text-muted)' : 'var(--text-primary)',
                        cursor: safePage === 0 ? 'default' : 'pointer' }}>
                      ‹
                    </button>
                    {pageNums.map((n, i) => {
                      const prev = pageNums[i - 1];
                      return (
                        <React.Fragment key={n}>
                          {prev !== undefined && n - prev > 1 && (
                            <span style={{ color: 'var(--text-muted)', fontSize: 12, padding: '0 2px' }}>…</span>
                          )}
                          <button onClick={() => setImportPage(n)}
                            style={{ minWidth: 32, padding: '4px 6px', borderRadius: 6,
                              border: '1px solid ' + (n === safePage ? 'var(--accent)' : 'var(--border)'),
                              background: n === safePage ? 'var(--accent)' : 'var(--bg-hover)',
                              color: n === safePage ? 'var(--bg-primary)' : 'var(--text-primary)',
                              fontWeight: n === safePage ? 700 : 400, fontSize: 13, cursor: 'pointer' }}>
                            {n + 1}
                          </button>
                        </React.Fragment>
                      );
                    })}
                    <button onClick={() => setImportPage(p => Math.min(totalPages - 1, p + 1))}
                      disabled={safePage === totalPages - 1}
                      style={{ padding: '4px 10px', borderRadius: 6, border: '1px solid var(--border)', fontSize: 13,
                        background: safePage === totalPages - 1 ? 'transparent' : 'var(--bg-hover)',
                        color: safePage === totalPages - 1 ? 'var(--text-muted)' : 'var(--text-primary)',
                        cursor: safePage === totalPages - 1 ? 'default' : 'pointer' }}>
                      ›
                    </button>
                  </div>
                )}
              </div>
            );
          })()}

          {importedEvents.length === 0 && !busy && (
            <div style={{ color: 'var(--text-muted)', fontSize: 13, marginTop: 8 }}>
              取込済みのイベントはありません。上のボタンで取込を開始してください。
            </div>
          )}
        </div>
      );
    }

    // ==================== CUSTOMER ANALYSIS SECTION ====================
    function CustomerAnalysisSection({ players, showToast, isAdmin = false }) {
      const [sunvyData, setSunvyData] = useState([]);
      const [cachedAt, setCachedAt] = useState('');
      const [cacheSource, setCacheSource] = useState('');
      const [loading, setLoading] = useState(true);
      const [sortBy, setSortBy] = useState('points');
      const [sortDir, setSortDir] = useState('desc');
      const [uploading, setUploading] = useState(false);
      const [nameSearch, setNameSearch] = useState('');
      const [dateFrom, setDateFrom] = useState('');
      const [dateTo, setDateTo] = useState('');
      const csvInputRef = React.useRef(null);

      const loadCache = () => {
        api('/api/sunvy/cache').then(data => {
          if (data.members) {
            setSunvyData(data.members);
            setCachedAt(data.cachedAt || '');
            setCacheSource(data.source || 'sunvy');
          }
          setLoading(false);
        }).catch(() => setLoading(false));
      };

      useEffect(() => { loadCache(); }, []);

      const handleCsvUpload = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        e.target.value = '';
        setUploading(true);
        try {
          const form = new FormData();
          form.append('file', file);
          const resp = await fetch('/api/sunvy/upload-csv', { method: 'POST', body: form });
          const data = await resp.json();
          if (!resp.ok) throw new Error(data.error || 'アップロード失敗');
          showToast(`✅ ${data.count}人のデータを取り込みました`);
          loadCache();
        } catch (err) {
          showToast(err.message, 'error');
        } finally {
          setUploading(false);
        }
      };

      // SunvyデータとプレイヤーをmemberCodeで突合（常にSunvyデータありのみ）
      const baseRows = players
        .map(p => {
          const sm = sunvyData.find(m => m.memberCode && m.memberCode === p.memberCode);
          if (!sm) return null;
          return {
            id: p.id,
            name: p.name,
            memberCode: p.memberCode || '',
            points:    sm.points    || '',
            dollars:   sm.dollars   || '',
            lastVisit: sm.lastVisit || '',
          };
        })
        .filter(Boolean);

      // フィルター適用
      const filteredRows = baseRows.filter(r => {
        if (nameSearch && !r.name.toLowerCase().includes(nameSearch.toLowerCase())) return false;
        if (dateFrom && r.lastVisit && r.lastVisit < dateFrom) return false;
        if (dateTo   && r.lastVisit && r.lastVisit > dateTo)   return false;
        // dateFrom/dateTo が指定されていて lastVisit が空の行は除外
        if ((dateFrom || dateTo) && !r.lastVisit) return false;
        return true;
      });

      const handleSort = (col) => {
        if (sortBy === col) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
        else { setSortBy(col); setSortDir(col === 'name' ? 'asc' : 'desc'); }
      };

      const sortedRows = [...filteredRows].sort((a, b) => {
        let av = a[sortBy], bv = b[sortBy];
        const aEmpty = av === '' || av === null || av === undefined;
        const bEmpty = bv === '' || bv === null || bv === undefined;
        if (aEmpty && bEmpty) return 0;
        if (aEmpty) return 1;
        if (bEmpty) return -1;
        if (sortBy === 'points' || sortBy === 'dollars') {
          av = parseFloat(av) || 0;
          bv = parseFloat(bv) || 0;
        }
        if (av < bv) return sortDir === 'asc' ? -1 : 1;
        if (av > bv) return sortDir === 'asc' ? 1 : -1;
        return 0;
      });

      const hasFilter = nameSearch || dateFrom || dateTo;

      const SortIcon = ({ col }) => {
        if (sortBy !== col) return <span style={{color: 'var(--text-muted)', marginLeft: 4}}>↕</span>;
        return <span style={{color: 'var(--accent)', marginLeft: 4}}>{sortDir === 'asc' ? '↑' : '↓'}</span>;
      };

      if (loading) return <div style={{textAlign: 'center', padding: 40, color: 'var(--text-muted)'}}>読み込み中...</div>;

      const sourceIcon  = cacheSource === 'csv' ? '📂' : '📡';
      const sourceLabel = cacheSource === 'csv' ? 'CSVインポート' : 'Sunvyスクレイプ';

      return (
        <div style={{marginTop: 16}}>
          {/* 隠しファイル入力 */}
          <input ref={csvInputRef} type="file" accept=".csv" style={{display:'none'}} onChange={handleCsvUpload} />

          {/* CSVアップロードボタン */}
          <div style={{display:'flex', alignItems:'center', gap:10, marginBottom:12, flexWrap:'wrap'}}>
            <button
              className="btn btn-secondary"
              style={{fontSize:12, padding:'6px 14px', display:'flex', alignItems:'center', gap:6}}
              onClick={() => csvInputRef.current && csvInputRef.current.click()}
              disabled={uploading}
            >
              {uploading ? '⏳ 取り込み中...' : '📂 CSVアップロード'}
            </button>
            <span style={{fontSize:11, color:'var(--text-muted)'}}>
              Sunvy管理画面からダウンロードしたCSVを選択してください
            </span>
          </div>

          {/* データソース情報 */}
          {cachedAt ? (
            <div style={{fontSize:12, color:'var(--text-muted)', marginBottom:12}}>
              {sourceIcon} {sourceLabel}: {cachedAt.split('T')[0]} 取得 |&nbsp;
              {hasFilter
                ? <span>{sortedRows.length}人表示 / {baseRows.length}人該当</span>
                : <span>{baseRows.length}人</span>}
            </div>
          ) : (
            <div style={{
              background:'rgba(245,158,11,0.1)', border:'1px solid var(--accent)',
              borderRadius:8, padding:12, marginBottom:16, fontSize:13, color:'var(--text-secondary)'
            }}>
              ⚠ データがありません。「CSVアップロード」からSunvy管理画面のCSVを取り込むか、「プレイヤー情報取得」からスクレイプしてください。
            </div>
          )}

          {/* 検索・フィルターバー */}
          {cachedAt && (
            <div style={{
              display:'flex', gap:8, marginBottom:12, flexWrap:'wrap', alignItems:'center',
              background:'var(--bg-secondary)', borderRadius:8, padding:'10px 12px'
            }}>
              {/* 名前検索 */}
              <div style={{display:'flex', alignItems:'center', gap:6, flex:'1 1 160px', minWidth:160}}>
                <span style={{fontSize:12, color:'var(--text-secondary)', whiteSpace:'nowrap'}}>🔍 名前</span>
                <input
                  className="form-input"
                  style={{fontSize:12, padding:'5px 10px', height:32}}
                  placeholder="プレイヤー名で検索..."
                  value={nameSearch}
                  onChange={e => setNameSearch(e.target.value)}
                />
              </div>

              {/* 来店日From */}
              <div style={{display:'flex', alignItems:'center', gap:6, flex:'1 1 160px', minWidth:160}}>
                <span style={{fontSize:12, color:'var(--text-secondary)', whiteSpace:'nowrap'}}>📅 来店日</span>
                <input
                  type="date"
                  className="form-input"
                  style={{fontSize:12, padding:'5px 10px', height:32, colorScheme:'dark'}}
                  value={dateFrom}
                  onChange={e => setDateFrom(e.target.value)}
                />
              </div>

              {/* 来店日To */}
              <div style={{display:'flex', alignItems:'center', gap:6, flex:'1 1 130px', minWidth:130}}>
                <span style={{fontSize:12, color:'var(--text-secondary)', whiteSpace:'nowrap'}}>〜</span>
                <input
                  type="date"
                  className="form-input"
                  style={{fontSize:12, padding:'5px 10px', height:32, colorScheme:'dark'}}
                  value={dateTo}
                  onChange={e => setDateTo(e.target.value)}
                />
              </div>

              {/* クリアボタン */}
              {hasFilter && (
                <button
                  className="btn btn-secondary"
                  style={{fontSize:11, padding:'5px 10px', height:32, whiteSpace:'nowrap'}}
                  onClick={() => { setNameSearch(''); setDateFrom(''); setDateTo(''); }}
                >
                  ✕ クリア
                </button>
              )}
            </div>
          )}

          {/* テーブル */}
          <div className="card" style={{padding:0, overflow:'hidden'}}>
            <table className="admin-table">
              <thead>
                <tr>
                  <th className="sortable" onClick={() => handleSort('name')}>
                    プレイヤー名<SortIcon col="name" />
                  </th>
                  <th>メンバーコード</th>
                  <th className="sortable" onClick={() => handleSort('points')} style={{textAlign:'right'}}>
                    9Hポイント<SortIcon col="points" />
                  </th>
                  <th className="sortable" onClick={() => handleSort('dollars')} style={{textAlign:'right'}}>
                    9Hドル<SortIcon col="dollars" />
                  </th>
                  <th className="sortable" onClick={() => handleSort('lastVisit')}>
                    直近来店日<SortIcon col="lastVisit" />
                  </th>
                </tr>
              </thead>
              <tbody>
                {sortedRows.map(r => (
                  <tr key={r.id}>
                    <td style={{fontWeight:500}}>{r.name}</td>
                    <td style={{fontSize:11, color:'var(--text-muted)'}}>{r.memberCode || '-'}</td>
                    <td style={{textAlign:'right'}}>
                      {r.points
                        ? <span style={{fontWeight:600}}>{Number(r.points).toLocaleString()}</span>
                        : <span style={{color:'var(--text-muted)'}}>-</span>}
                    </td>
                    <td style={{textAlign:'right'}}>
                      {r.dollars && r.dollars !== '0'
                        ? <span style={{fontWeight:600, color:'var(--positive)'}}>{Number(r.dollars).toLocaleString()}</span>
                        : r.dollars === '0'
                          ? <span style={{color:'var(--text-muted)'}}>0</span>
                          : <span style={{color:'var(--text-muted)'}}>-</span>}
                    </td>
                    <td style={{fontSize:12}}>
                      {r.lastVisit || <span style={{color:'var(--text-muted)'}}>-</span>}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
            {sortedRows.length === 0 && (
              <div style={{textAlign:'center', padding:20, color:'var(--text-muted)'}}>
                {hasFilter ? '条件に一致するプレイヤーがいません' : 'Sunvyデータのあるプレイヤーがいません'}
              </div>
            )}
          </div>
        </div>
      );
    }

    // ==================== PRIZE MANAGEMENT SECTION ====================
    function PrizeManagementSection({ players, showToast }) {
      const [prizes, setPrizes] = useState({ types: [], awards: [] });
      const [loading, setLoading] = useState(true);
      const [showTypeMaster, setShowTypeMaster] = useState(false); // モーダル
      const [showTypeForm, setShowTypeForm] = useState(false);
      const [newTypeName, setNewTypeName] = useState('');
      const [newTypeDesc, setNewTypeDesc] = useState('');
      const [showAwardForm, setShowAwardForm] = useState(false);
      const todayStr = () => new Date().toLocaleDateString('sv-SE');
      const [awardForm, setAwardForm] = useState({ playerId: '', typeId: '', note: '', occurredAt: todayStr(), quantity: 1 });
      const [filterType, setFilterType] = useState('');
      const [filterStatus, setFilterStatus] = useState('');
      const [filterName, setFilterName] = useState('');
      const [confirmToggle, setConfirmToggle] = useState(null); // { award } or null
      const [confirmDelete, setConfirmDelete] = useState(null); // award id or null

      const loadPrizes = async () => {
        try { const data = await api('/api/prizes'); setPrizes(data); } catch (e) {}
        setLoading(false);
      };
      useEffect(() => { loadPrizes(); }, []);

      const addType = async () => {
        if (!newTypeName.trim()) return;
        try {
          await api('/api/prizes/types', { method: 'POST', body: JSON.stringify({ name: newTypeName.trim(), description: newTypeDesc.trim() }) });
          setNewTypeName(''); setNewTypeDesc(''); setShowTypeForm(false);
          showToast('権利種別を追加しました'); loadPrizes();
        } catch (e) { showToast(e.message, 'error'); }
      };

      const deleteType = async (id) => {
        if (!confirm('この権利種別と関連する全付与記録を削除します。よろしいですか？')) return;
        try {
          await api(`/api/prizes/types/${id}`, { method: 'DELETE' });
          showToast('削除しました'); loadPrizes();
        } catch (e) { showToast(e.message, 'error'); }
      };

      const addAward = async () => {
        if (!awardForm.playerId || !awardForm.typeId) { showToast('プレイヤーと権利種別を選択してください', 'error'); return; }
        if (!awardForm.occurredAt) { showToast('権利発生日を入力してください', 'error'); return; }
        if (!awardForm.quantity || awardForm.quantity < 1) { showToast('個数は1以上を入力してください', 'error'); return; }
        try {
          await api('/api/prizes/awards', { method: 'POST', body: JSON.stringify(awardForm) });
          setAwardForm({ playerId: '', typeId: '', note: '', occurredAt: todayStr(), quantity: 1 });
          setShowAwardForm(false);
          showToast('権利を登録しました'); loadPrizes();
        } catch (e) { showToast(e.message, 'error'); }
      };

      const toggleStatus = (award) => {
        setConfirmToggle({ award });
      };

      const doToggleStatus = async () => {
        if (!confirmToggle) return;
        const award = confirmToggle.award;
        const newStatus = award.status === '未付与' ? '付与済み' : '未付与';
        setConfirmToggle(null);
        try {
          await api(`/api/prizes/awards/${award.id}`, { method: 'PUT', body: JSON.stringify({ status: newStatus }) });
          loadPrizes();
        } catch (e) { showToast(e.message, 'error'); }
      };

      const deleteAward = async (id) => {
        try {
          await api(`/api/prizes/awards/${id}`, { method: 'DELETE' });
          showToast('削除しました'); loadPrizes();
        } catch (e) { showToast(e.message, 'error'); }
      };

      const getPlayerName = (id) => { const p = players.find(p => p.id === id); return p ? p.name : id; };
      const getTypeName   = (id) => { const t = prizes.types.find(t => t.id === id); return t ? t.name : id; };

      const filteredAwards = prizes.awards.filter(a => {
        if (filterType   && a.typeId !== filterType) return false;
        if (filterStatus && a.status !== filterStatus) return false;
        if (filterName) {
          const name = getPlayerName(a.playerId).toLowerCase();
          if (!name.includes(filterName.toLowerCase())) return false;
        }
        return true;
      });

      if (loading) return <div style={{textAlign:'center', padding:40, color:'var(--text-muted)'}}>読み込み中...</div>;

      return (
        <div style={{marginTop:16}}>

          {/* ===== ステータス変更確認ダイアログ ===== */}
          {confirmToggle && (
            <div className="modal-overlay" onClick={() => setConfirmToggle(null)}>
              <div className="modal-box" onClick={e => e.stopPropagation()} style={{maxWidth:360, textAlign:'center'}}>
                <div style={{fontSize:18, fontWeight:700, marginBottom:12}}>ステータス変更</div>
                <div style={{color:'var(--text-secondary)', marginBottom:8, fontSize:14}}>
                  <span style={{fontWeight:600, color:'var(--text-primary)'}}>{(() => { const p = players.find(p => p.id === confirmToggle.award.playerId); return p ? p.name : confirmToggle.award.playerId; })()}</span> の権利ステータスを
                </div>
                <div style={{margin:'12px 0', display:'flex', alignItems:'center', justifyContent:'center', gap:12}}>
                  <span className={`status-badge ${confirmToggle.award.status === '付与済み' ? 'given' : 'pending'}`} style={{cursor:'default'}}>
                    {confirmToggle.award.status}
                  </span>
                  <span style={{color:'var(--text-muted)', fontSize:18}}>→</span>
                  <span className={`status-badge ${confirmToggle.award.status === '未付与' ? 'given' : 'pending'}`} style={{cursor:'default'}}>
                    {confirmToggle.award.status === '未付与' ? '付与済み' : '未付与'}
                  </span>
                </div>
                <div style={{color:'var(--text-muted)', fontSize:13, marginBottom:20}}>に変更します。よろしいですか？</div>
                <div style={{display:'flex', gap:10, justifyContent:'center'}}>
                  <button className="btn btn-secondary" style={{minWidth:80}} onClick={() => setConfirmToggle(null)}>いいえ</button>
                  <button className="btn btn-primary" style={{minWidth:80}} onClick={doToggleStatus}>はい</button>
                </div>
              </div>
            </div>

          {/* ===== 権利種別マスター モーダル ===== */}
          {showTypeMaster && (
            <div className="modal-overlay" onClick={() => { setShowTypeMaster(false); setShowTypeForm(false); }}>
              <div className="modal-box" onClick={e => e.stopPropagation()} style={{maxWidth:520}}>

                  <div className="modal-title">権利種別マスター</div>
                  <button className="modal-close" onClick={() => { setShowTypeMaster(false); setShowTypeForm(false); }}>✕</button>
                </div>

                {/* 追加フォーム */}
                <div style={{marginBottom:16}}>
                  {!showTypeForm ? (
                    <button className="btn btn-primary btn-sm" onClick={() => setShowTypeForm(true)}>+ 種別追加</button>

                          onChange={e => setNewTypeName(e.target.value)} autoFocus />
                        <input className="form-input" placeholder="説明（任意）" value={newTypeDesc}
                          onChange={e => setNewTypeDesc(e.target.value)} />
                      </div>
                      <div style={{display:'flex', gap:8, justifyContent:'flex-end'}}>
                        <button className="btn btn-secondary btn-sm" onClick={() => { setShowTypeForm(false); setNewTypeName(''); setNewTypeDesc(''); }}>キャンセル</button>

                  <div style={{textAlign:'center', padding:'20px 0', color:'var(--text-muted)', fontSize:13}}>
                    権利種別がありません
                  </div>
                ) : (
                  <table className="admin-table">
                    <thead>
                      <tr><th>権利種別名</th><th>説明</th><th style={{textAlign:'center'}}>登録数</th><th></th></tr>
                    </thead>
                    <tbody>
                      {prizes.types.map(t => (
                        <tr key={t.id}>
                          <td style={{fontWeight:600}}>{t.name}</td>
                          <td style={{fontSize:12, color:'var(--text-muted)'}}>{t.description || '-'}</td>
                          <td style={{textAlign:'center'}}>
                            <span style={{background:'var(--bg-hover)', borderRadius:12, padding:'2px 8px', fontSize:12}}>
                              {prizes.awards.filter(a => a.typeId === t.id).length}件
