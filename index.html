            <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:14, flexWrap:'wrap', gap:8}}>
              <div className="card-title" style={{margin:0}}>権利付与管理</div>
              <div style={{display:'flex', gap:8}}>
                <button className="btn btn-secondary btn-sm" onClick={() => { setShowTypeMaster(true); setShowTypeForm(false); }}>
                  権利種別マスター
                </button>
                <button className="btn btn-primary btn-sm"
                  disabled={prizes.types.length === 0}
                  onClick={() => setShowAwardForm(!showAwardForm)}>
                  {showAwardForm ? 'キャンセル' : '+ 権利を登録'}
                </button>
              </div>
            </div>

            {/* 登録フォーム */}
            {showAwardForm && (
              <div className="inline-form">
                <div style={{display:'grid', gridTemplateColumns:'140px 1fr 1fr 80px', gap:8, marginBottom:8, alignItems:'end'}}>
                  <div>
                    <div className="form-label" style={{marginBottom:4}}>権利発生日 *</div>
                    <input type="date" className="form-input" style={{colorScheme:'dark', padding:'7px 8px', fontSize:13}}
                      value={awardForm.occurredAt}
                      onChange={e => setAwardForm(p => ({...p, occurredAt: e.target.value}))} />
                  </div>
                  <div>
                    <div className="form-label" style={{marginBottom:4}}>権利種別 *</div>
                    <select className="form-select" value={awardForm.typeId} onChange={e => setAwardForm(p => ({...p, typeId: e.target.value}))}>
                      <option value="">選択してください</option>
                      {prizes.types.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}
                    </select>
                  </div>
                  <div>
                    <div className="form-label" style={{marginBottom:4}}>プレイヤー *</div>
                    <PlayerAutocomplete players={players} value={awardForm.playerId} onChange={v => setAwardForm(p => ({...p, playerId: v}))} />
                  </div>
                  <div>
                    <div className="form-label" style={{marginBottom:4}}>個数 *</div>
                    <input type="number" className="form-input" min="1" style={{padding:'7px 8px', fontSize:13, textAlign:'center'}}
                      value={awardForm.quantity}
                      onChange={e => setAwardForm(p => ({...p, quantity: Math.max(1, parseInt(e.target.value)||1)}))} />
                  </div>
                </div>
                <div style={{display:'flex', gap:8}}>
                  <input className="form-input" style={{flex:1}} placeholder="メモ（任意）例: 2025年1月度優勝" value={awardForm.note}
                    onChange={e => setAwardForm(p => ({...p, note: e.target.value}))} />
                  <button className="btn btn-primary btn-sm" onClick={addAward}>登録</button>
                </div>
              </div>
            )}

            {/* フィルター: 名前・種別・ステータス */}
            <div style={{display:'flex', gap:8, marginBottom:14, flexWrap:'wrap', alignItems:'center'}}>
              <input className="form-input" style={{flex:'1 1 140px', minWidth:120, padding:'7px 10px', fontSize:12}}
                placeholder="🔍 名前で絞り込み"
                value={filterName} onChange={e => setFilterName(e.target.value)} />
              <select className="form-select" style={{flex:'1 1 140px', minWidth:120, padding:'7px 10px', fontSize:12}}
                value={filterType} onChange={e => setFilterType(e.target.value)}>
                <option value="">全種別</option>
                {prizes.types.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}
              </select>
              <select className="form-select" style={{flex:'0 0 120px', padding:'7px 10px', fontSize:12}}
                value={filterStatus} onChange={e => setFilterStatus(e.target.value)}>
                <option value="">全ステータス</option>
                <option value="未付与">未付与</option>
                <option value="付与済み">付与済み</option>
              </select>
              {(filterName || filterType || filterStatus) && (
                <button className="btn btn-secondary btn-sm" style={{whiteSpace:'nowrap'}}
                  onClick={() => { setFilterName(''); setFilterType(''); setFilterStatus(''); }}>
                  ✕ クリア
                </button>
              )}
            </div>

            {/* テーブル */}
            <table className="admin-table">
              <thead>
                <tr>
                  <th>プレイヤー</th>
                  <th>権利種別</th>
                  <th style={{textAlign:'center'}}>個数</th>
                  <th>権利発生日</th>
                  <th>ステータス</th>
                  <th>付与日</th>
                  <th>メモ</th>
                  <th></th>
                </tr>
              </thead>
              <tbody>
                {filteredAwards.map(a => (
                  <tr key={a.id}>
                    <td style={{fontWeight:500}}>{getPlayerName(a.playerId)}</td>
                    <td style={{fontSize:12}}>{getTypeName(a.typeId)}</td>
                    <td style={{textAlign:'center', fontWeight:600}}>{a.quantity || 1}</td>
                    <td style={{fontSize:12, color:'var(--text-secondary)'}}>{a.occurredAt || '-'}</td>
                    <td>
                      <button className={`status-badge ${a.status==='付与済み' ? 'given' : 'pending'}`}
                        onClick={() => toggleStatus(a)} title="クリックでステータス変更">
                        {a.status}
                      </button>
                    </td>
                    <td style={{fontSize:12, color:'var(--text-muted)'}}>
                      {a.givenAt ? a.givenAt.split('T')[0] : '-'}
                    </td>
                    <td style={{fontSize:12, color:'var(--text-secondary)', maxWidth:100, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>
                      {a.note || '-'}
                    </td>
                    <td>
                      {confirmDelete === a.id ? (
                        <div style={{display:'flex', gap:4, alignItems:'center'}}>
                          <span style={{fontSize:11, color:'var(--danger)', whiteSpace:'nowrap'}}>削除？</span>
                          <button className="btn btn-sm" style={{background:'var(--danger)', color:'#fff', padding:'3px 8px'}}
                            onClick={() => { deleteAward(a.id); setConfirmDelete(null); }}>はい</button>
                          <button className="btn btn-secondary btn-sm" style={{padding:'3px 8px'}}
                            onClick={() => setConfirmDelete(null)}>いいえ</button>
                        </div>
                      ) : (
                        <button className="btn btn-danger btn-sm" onClick={() => setConfirmDelete(a.id)}>削除</button>
                      )}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
            {filteredAwards.length === 0 && (
              <div style={{textAlign:'center', padding:20, color:'var(--text-muted)', fontSize:13}}>
                {prizes.types.length === 0
                  ? '先に「権利種別マスター」から種別を追加してください'
                  : (filterName || filterType || filterStatus) ? 'フィルター条件に一致する記録がありません' : '権利登録がありません'}
              </div>
            )}
          </div>
        </div>
      );
    }

    // ==================== MAIN APP ====================
    function App() {
      const [authenticated, setAuthenticated] = useState(false);
      const [checking, setChecking] = useState(true);
      const [role, setRole] = useState('');
      const [currentEmail, setCurrentEmail] = useState('');
      const [section, setSection] = useState(null);
      const [players, setPlayers] = useState([]);
      const [toast, setToast] = useState(null);
      const [showUserMgmt, setShowUserMgmt] = useState(false);
      const [showForgot, setShowForgot] = useState(false);

      // URLにreset_tokenがあればリセット画面
      const urlParams = new URLSearchParams(window.location.search);
      const resetToken = urlParams.get('reset_token');

      const showToast = (message, type = 'success') => setToast({ message, type });
      const isAdmin = role === 'admin';

      const loadPlayers = async () => {
        try { const data = await api('/api/players'); setPlayers(data.players || []); } catch (err) {}
      };

      useEffect(() => {
        api('/api/auth/check').then(data => {
          setAuthenticated(data.authenticated);
          setRole(data.role || '');
          setCurrentEmail(data.email || '');
          setChecking(false);
          if (data.authenticated) loadPlayers();
        }).catch(() => setChecking(false));
      }, []);

      const handleLogin = (res) => {
        setAuthenticated(true);
        setRole(res.role || '');
        setCurrentEmail(res.email || '');
        loadPlayers();
      };

      const handleLogout = async () => {
        await api('/api/logout', { method: 'POST' });
        setAuthenticated(false);
        setRole('');
        setCurrentEmail('');
        setSection(null);
      };

      if (resetToken) return (
        <ResetPasswordScreen token={resetToken} onDone={() => { window.history.replaceState({}, '', '/'); window.location.reload(); }} />
      );

      if (checking) return (
        <div style={{display: 'flex', justifyContent: 'center', alignItems: 'center', height: '100vh', color: 'var(--text-muted)'}}>
          読み込み中...
        </div>
      );
      if (!authenticated) {
        if (showForgot) return <ForgotPasswordScreen onBack={() => setShowForgot(false)} />;
        return <LoginScreen onLogin={handleLogin} onForgot={() => setShowForgot(true)} />;
      }

      const sectionTitles = {
        players: 'プレイヤー情報取得',
        leaderboard: 'リーダーズボード',
        analysis: '顧客データ分析',
        prizes: '権利付与管理'
      };

      return (
        <div className="container">
          <div className="admin-header">
            <div className="admin-header-title">
              {section !== null && (
                <button className="back-btn" onClick={() => setSection(null)} title="ポータルに戻る">←</button>
              )}
              {section !== null ? sectionTitles[section] : '9HIGH 仙台 管理ポータル'}
            </div>
            <div className="admin-header-actions">
              <span style={{fontSize:11, color:'var(--text-muted)', marginRight:4}}>{currentEmail}</span>
              {isAdmin && (
                <button className="btn btn-secondary btn-sm" onClick={() => setShowUserMgmt(true)}>
                  👥 アカウント
                </button>
              )}
              <a href="/leaderboard" className="btn btn-secondary btn-sm">リーダーボード</a>
              <button className="btn btn-secondary btn-sm" onClick={handleLogout}>ログアウト</button>
            </div>
          </div>

          {section === null && <PortalHome onNavigate={setSection} />}
          {section === 'players' && <PlayersTab players={players} onReload={loadPlayers} showToast={showToast} isAdmin={isAdmin} />}
          {section === 'leaderboard' && <LeaderboardSection players={players} showToast={showToast} />}
          {section === 'analysis' && <CustomerAnalysisSection players={players} showToast={showToast} isAdmin={isAdmin} />}
          {section === 'prizes' && <PrizeManagementSection players={players} showToast={showToast} />}

          {showUserMgmt && <UserManagementModal onClose={() => setShowUserMgmt(false)} showToast={showToast} currentEmail={currentEmail} />}
          {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
